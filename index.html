<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNEK - Classic Snake Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="bg-grid" aria-hidden="true"></div>

  <main class="shell">

    <header class="hdr">
      <div class="hdr__logo">SNEK</div>
      <div class="hdr__scores">
        <div class="score-pill">
          <span class="score-pill__label">SCORE</span>
          <span class="score-pill__val" id="score">0</span>
        </div>
        <div class="score-pill score-pill--hi">
          <span class="score-pill__label">BEST</span>
          <span class="score-pill__val" id="highScore">0</span>
        </div>
      </div>
    </header>

    <div class="speed-bar" id="speedBar">
      <span class="speed-bar__label">SPEED</span>
      <div class="speed-bar__track">
        <div class="speed-bar__fill" id="speedFill"></div>
      </div>
      <span class="speed-bar__level" id="speedLevel">1</span>
    </div>

    <section class="settings" aria-label="Game settings">
      <label class="field">
        <span class="field__label">MODE</span>
        <select class="field__control" id="difficultySelect">
          <option value="chill">Chill</option>
          <option value="normal" selected>Normal</option>
          <option value="fast">Fast</option>
        </select>
      </label>
      <label class="toggle">
        <input type="checkbox" id="wallMode" />
        <span>Walls</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="soundToggle" checked />
        <span>Sound</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="gridToggle" checked />
        <span>Grid</span>
      </label>
    </section>

    <div class="arena" id="arena">
      <canvas id="gameCanvas"></canvas>

      <div class="overlay" id="overlayStart">
        <div class="overlay__card">
          <div class="overlay__emoji">S</div>
          <h2 class="overlay__title">Ready to Snek?</h2>
          <p class="overlay__sub">Use arrows, WASD<br>Eat food. Grow. Survive.</p>
          <button class="btn btn--primary" id="btnStart">Start Game</button>
          <div class="overlay__hint">
            <kbd>Space</kbd><kbd>P</kbd><kbd>Esc</kbd>
            <span>start, pause, resume</span>
          </div>
        </div>
      </div>

      <div class="overlay overlay--hidden" id="overlayDead">
        <div class="overlay__card overlay__card--dead">
          <div class="overlay__emoji">X</div>
          <h2 class="overlay__title">Game Over</h2>
          <div class="result-grid">
            <div class="result-item">
              <span class="result-item__label">Score</span>
              <span class="result-item__val" id="finalScore">0</span>
            </div>
            <div class="result-item">
              <span class="result-item__label">Best</span>
              <span class="result-item__val" id="finalBest">0</span>
            </div>
            <div class="result-item">
              <span class="result-item__label">Length</span>
              <span class="result-item__val" id="finalLength">0</span>
            </div>
            <div class="result-item">
              <span class="result-item__label">Level</span>
              <span class="result-item__val" id="finalLevel">0</span>
            </div>
          </div>
          <button class="btn btn--primary" id="btnRestart">Play Again</button>
        </div>
      </div>

      <div class="overlay overlay--hidden" id="overlayPause">
        <div class="overlay__card">
          <div class="overlay__emoji">II</div>
          <h2 class="overlay__title">Paused</h2>
          <button class="btn btn--primary" id="btnResume">Resume</button>
        </div>
      </div>
    </div>

    <div class="dpad" id="dpad" aria-label="Direction controls">
      <button class="dpad__btn dpad__btn--up" data-dir="UP" aria-label="Up">UP</button>
      <button class="dpad__btn dpad__btn--left" data-dir="LEFT" aria-label="Left">L</button>
      <button class="dpad__btn dpad__btn--right" data-dir="RIGHT" aria-label="Right">R</button>
      <button class="dpad__btn dpad__btn--down" data-dir="DOWN" aria-label="Down">DN</button>
    </div>

    <div class="footer-row">
      <button class="btn btn--ghost" id="btnPause">Pause</button>
      <span class="footer-tip">Space starts/restarts, P pauses</span>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
